<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

    body {
        background-image: url('https://i.pinimg.com/1200x/9c/a5/30/9ca530dc05592824ff3897926a29347d.jpg');
        background-size: cover;
        background-repeat: no-repeat;
    }

     .card {
            width: 500px;
            margin: 100px auto;
            padding: 30px;
            border: 2px solid #ad7878;
            border-radius: 6px;
            box-shadow: 0 3px 6px rgba(164, 161, 161, 0.1);
     }

     h1{
        text-align: center;
        color: #712525;
        font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
     }

    </style>
</head>
<body>

    <div class="card" style="background-color: rgb(242, 247, 251);">
        <h1><b>Log In</b></h1>

         <div class="row">
            <div class="col">
                <label for="username" class="form-label" style="color: #693131; font-family: Georgia, 'Times New Roman', Times, serif;">Username</label>
                <input type="text" id="username" class="form-control">
            </div>
        </div>

        <br>
            
        <div class="row">
            <div class="col">
                <label for="password" class="form-label" style="color: #693131; font-family: Georgia, 'Times New Roman', Times, serif;">Password</label>
                <input type="password" id="password" class="form-control">
            </div>
        </div>
        

        <br><br>

        <div class="row">
            <div class="col">
                <label for="rmber" class="form-label" style="font-family:Georgia, 'Times New Roman', Times, serif; color: #5e2b2b;">Stay Logged In</label>
                <input type="checkbox" id="loggedin" class="form-check input" onchange="checkBoxFunction()">
            </div>
        </div>

        <br>

      <div class="row justify-content-center">
            <div class="col-auto d-flex gap-2">
           <input type="button" id="loginBTN" value="Login"
            class="btn rounded-5"
            style="background-color: #b66767; color: aliceblue; font-family: Georgia;"
            onclick="login()">
            <input type="reset" id="cancel" value="Cancel"  style="background-color: #b66767; color: aliceblue; font-family: Georgia, 'Times New Roman', Times, serif;" class="btn rounded-5">
        </div>
        
        <div class="row">
          <hr style="width: 80%; margin: 25px auto;">

        <a href="#" class="d-block" style="text-align: center;">Forgot username/password?</a>
        </div>

      </div>
        <p id="message" style="text-align:center; margin-top:10px; font-family: Georgia, 'Times New Roman', Times, serif; color: #693131;" ></p>
    </div>

<script>
    let attempt_counter = 0;

    function login() {

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let correctUser = "Alexixi0_0";
    let correctPass = "Savivi061011";

    let loginBtn = document.getElementById("loginBTN");
    let stayedloggedin = document.getElementById("loggedin").checked;

    if (username === correctUser && password === correctPass) {

        if (stayedloggedin)
            alert("You will stay logged in.");

        alert("Login successful. Welcome " + username + "!");

        attempt_counter = 0; 

        window.location.href = "notebook.html";

    } else {

        attempt_counter++;

        alert("Incorrect username or password.");

        document.getElementById("message").innerText =
            "Incorrect username/password. Attempt " + attempt_counter + " of 3";

        if (attempt_counter >= 3) {

            alert("Too many failed attempts. Login locked.");

            loginBtn.disabled = true;
        }
    }
}

</script>


</body>
</html>
